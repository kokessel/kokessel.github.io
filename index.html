    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #0f0f0f;
            --accent-yellow: #a8ff00;
            --accent-pink: #ff2d6a;
            --accent-white: #ffffff;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --text-dim: #555555;
            --border-subtle: rgba(168, 255, 0, 0.15);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            95% { opacity: 0.9; }
            96% { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 999;
        }

            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .link-card::before {

            position: absolute;

            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(

                transparent,

            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

            border-color: var(--accent-pink);
            transform: translateX(8px);
            box-shadow:

        }

        .link-card:hover .link-icon {

        .link-icon {

            justify-content: center;
            border: 1px solid var(--text-dim);
            color: var(--text-muted);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .link-info {

        .link-title {

        .link-desc {

            color: var(--text-muted);
        }

        .link-arrow {
            color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .link-card:hover .link-arrow {
            color: var(--accent-pink);
            transform: translateX(4px);
        }

        .footer {

            align-items: center;

            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;

        .footer-status {

            gap: 8px;

        .terminal-line::before {

            margin-right: 8px;
            color: var(--accent-pink);
        }

        .corner-decoration {
            position: fixed;
            width: 100px;
            height: 100px;
            pointer-events: none;
            opacity: 0.3;
        }

        .corner-decoration.top-left {
            top: 20px;
            left: 20px;
            border-top: 1px solid var(--accent-yellow);
            border-left: 1px solid var(--accent-yellow);
        }

        .corner-decoration.top-right {
            top: 20px;
            right: 20px;
            border-top: 1px solid var(--accent-pink);
            border-right: 1px solid var(--accent-pink);
        }

        .corner-decoration.bottom-left {
            bottom: 20px;
            left: 20px;
            border-bottom: 1px solid var(--accent-pink);
            border-left: 1px solid var(--accent-pink);
        }

        .corner-decoration.bottom-right {
            bottom: 20px;
            right: 20px;
            border-bottom: 1px solid var(--accent-yellow);
            border-right: 1px solid var(--accent-yellow);
        }

        .avatar-block {
            position: relative;
            margin-bottom: 40px;
        }

        .avatar-frame {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 20px;
        }

        .avatar-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--accent-yellow);
            animation: flicker 10s infinite;
        }

        .avatar-frame::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid var(--accent-pink);
        }

        .avatar-inner {
            position: absolute;
            inset: 16px;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-icon {

            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-pink);
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-yellow);
            animation: pulse 1s infinite;
        }

        .info-block {
            padding: 0;
            border: none;
            background: transparent;
        }

        .info-block::before {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 16px;
            }

            .status-bar {
                flex-wrap: wrap;
                gap: 12px;
            }

            .title {
                letter-spacing: 2px;
            }

            .footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .corner-decoration {
                display: none;
            }
        }
